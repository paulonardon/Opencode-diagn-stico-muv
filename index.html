<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promt Base do Negócio</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
    --primary: #22d3ee;
    --primary-dark: #0891b2;
    --primary-light: rgba(34,211,238,0.10);
    --bg: #020617;
    --card: #050816;
    --text: #f8fafc;
    --text-secondary: #94a3b8;
    --border: rgba(148,163,184,0.18);
    --success: #22c55e;
    --radius: 18px;
    --shadow: 0 28px 80px rgba(0,0,0,0.55);
    --font: Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
}
body {
    font-family: var(--font);
    background:
        radial-gradient(circle at 20% 0%, rgba(34,211,238,0.13), transparent 32%),
        radial-gradient(circle at 85% 18%, rgba(59,130,246,0.12), transparent 28%),
        linear-gradient(180deg, #020617 0%, #000 100%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
.container {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid rgba(148,163,184,0.18);
    width: 100%;
    max-width: 640px;
    min-height: 520px;
    position: relative;
    overflow: hidden;
}
.container::before {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: linear-gradient(135deg, rgba(255,255,255,0.08), transparent 38%);
}
.progress-wrap {
    height: 3px;
    background: rgba(148,163,184,0.14);
    border-radius: 0 0 4px 4px;
}
.progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), #60a5fa);
    border-radius: 0 0 4px 4px;
    transition: width 0.5s ease;
    width: 0%;
}
.steps-container {
    position: relative;
    padding: 40px 40px 32px;
}
.step {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    padding: 40px 40px 32px;
    opacity: 0;
    transform: translateY(12px);
    pointer-events: none;
    transition: opacity 0.35s ease, transform 0.35s ease;
    display: flex;
    flex-direction: column;
}
.step.active {
    position: relative;
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
}
.step-count {
    font-size: 0.8rem;
    color: var(--primary);
    font-weight: 600;
    letter-spacing: 1.6px;
    text-transform: uppercase;
    margin-bottom: 8px;
}
.step-title {
    font-size: 1.35rem;
    font-weight: 700;
    line-height: 1.35;
    margin-bottom: 6px;
}
.step-subtitle {
    font-size: 0.95rem;
    color: var(--text-secondary);
    margin-bottom: 24px;
    line-height: 1.5;
}

/* Welcome */
.welcome-icon {
    width: 56px; height: 56px;
    background: rgba(34,211,238,0.08);
    border: 1px solid rgba(34,211,238,0.35);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem;
    font-weight: 800;
    letter-spacing: 1px;
    color: var(--primary);
    margin-bottom: 20px;
    box-shadow: inset 0 0 24px rgba(34,211,238,0.08), 0 0 36px rgba(34,211,238,0.08);
}
.welcome-title { font-size: 1.55rem; font-weight: 750; letter-spacing: -0.03em; margin-bottom: 8px; }
.welcome-sub { color: var(--text-secondary); margin-bottom: 28px; line-height: 1.5; }

/* Form elements */
.form-group { margin-bottom: 16px; }
.form-group label {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--text);
}
.form-group input,
.form-group textarea,
.form-group select {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: 12px;
    font-size: 1rem;
    font-family: var(--font);
    background: rgba(15,23,42,0.72);
    color: var(--text);
    transition: border-color 0.2s;
    outline: none;
}
.form-group input::placeholder,
.form-group textarea::placeholder { color: #64748b; }
.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(34,211,238,0.10);
}
.form-group textarea { resize: vertical; min-height: 80px; }
.char-count {
    text-align: right;
    font-size: 0.78rem;
    color: var(--text-secondary);
    margin-top: 4px;
}
.char-count.warning { color: #eab308; }
.char-count.over { color: #ef4444; }

/* Options grid */
.options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
}
.option-card {
    padding: 14px 16px;
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    font-size: 0.92rem;
    font-weight: 500;
    background: rgba(15,23,42,0.58);
    user-select: none;
}
.option-card:hover { border-color: rgba(34,211,238,0.55); background: var(--primary-light); color: #e0faff; }
.option-card.selected {
    border-color: var(--primary);
    background: var(--primary-light);
    box-shadow: 0 0 0 1px rgba(34,211,238,0.35), 0 0 28px rgba(34,211,238,0.08);
}
.option-card input { display: none; }

/* Checkbox grid */
.check-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.check-card {
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 0.9rem;
    font-weight: 500;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(15,23,42,0.58);
}
.check-card:hover { border-color: rgba(34,211,238,0.55); }
.check-card .check-box {
    width: 20px; height: 20px;
    border: 1px solid var(--border);
    border-radius: 4px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    font-size: 12px;
    color: white;
}
.check-card.checked { border-color: var(--primary); background: var(--primary-light); }
.check-card.checked .check-box { background: var(--primary); border-color: var(--primary); color: #001018; }
.check-card input { display: none; }

/* Buttons */
.btn-group {
    display: flex;
    gap: 10px;
    margin-top: auto;
    padding-top: 20px;
}
.btn {
    padding: 12px 28px;
    border: 1px solid transparent;
    border-radius: 999px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: var(--font);
}
.btn-primary {
    background: linear-gradient(135deg, var(--primary), #60a5fa);
    color: #020617;
    flex: 1;
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 12px 28px rgba(34,211,238,0.22); }
.btn-primary:disabled { opacity: 0.5; cursor: default; transform: none; box-shadow: none; }
.btn-secondary {
    background: rgba(15,23,42,0.72);
    border-color: var(--border);
    color: var(--text);
    min-width: 100px;
}
.btn-secondary:hover { background: rgba(30,41,59,0.9); border-color: rgba(148,163,184,0.36); }
.btn-secondary.hidden { visibility: hidden; }

/* Two-col transform */
.transform-group { display: flex; gap: 12px; align-items: center; }
.transform-group .form-group { flex: 1; margin-bottom: 0; }
.transform-arrow { font-size: 1.3rem; color: var(--primary); font-weight: 700; }

/* Processing */
.processing {
    text-align: center;
    padding: 60px 0;
}
.spinner {
    width: 48px; height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.processing h3 { margin-bottom: 8px; }
.processing p { color: var(--text-secondary); }

/* Result */
.result-area {
    background: #020617;
    color: #dbeafe;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    font-family: 'Courier New', monospace;
    font-size: 0.85rem;
    line-height: 1.6;
    white-space: pre-wrap;
    max-height: 400px;
    overflow-y: auto;
    margin-bottom: 16px;
}
.copy-btn {
    padding: 10px 24px;
    border: 1px solid rgba(34,211,238,0.4);
    border-radius: 999px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    background: rgba(34,211,238,0.10);
    color: var(--primary);
    transition: all 0.2s;
    font-family: var(--font);
}
.copy-btn:hover { background: rgba(34,211,238,0.18); }
.copy-btn.copied { background: var(--success); }
.upsell-box {
    margin-top: 20px;
    padding: 16px 20px;
    background: linear-gradient(135deg, rgba(34,211,238,0.08), rgba(96,165,250,0.06));
    border: 1px solid rgba(34,211,238,0.26);
    border-radius: 14px;
    text-align: center;
}
.upsell-box p { font-weight: 600; margin-bottom: 8px; }
.upsell-box small { color: var(--text-secondary); }

/* Conditional field */
.conditional-field { margin-top: -8px; margin-bottom: 16px; }
.conditional-field.hidden { display: none; }

/* Responsive */
@media (max-width: 540px) {
    .steps-container { padding: 24px 20px; }
    .step { padding: 24px 20px; }
    .options-grid { grid-template-columns: 1fr; }
    .check-grid { grid-template-columns: 1fr; }
    .transform-group { flex-direction: column; }
    .transform-arrow { transform: rotate(90deg); }
    .container { min-height: 480px; }
}
</style>
</head>
<body>
<div class="container" id="app">
    <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>

    {

        type: 'textarea',
        key: 'idealBuyer',
        placeholder: 'Ex: Donos de clínicas que já recebem leads, mas perdem tempo com pessoas sem perfil.',
        maxlength: 400
    },
    {
        id: 'problem',

        subtitle: 'Fale da dor real do cliente antes de comprar.',
        type: 'textarea',
        key: 'problem',
        placeholder: 'Ex: O cliente recebe contatos pelo WhatsApp, mas não sabe separar interessados reais de curiosos.',
        maxlength: 400
    },
    {
        id: 'transformation',
        title: 'Qual transformação você entrega?',
        subtitle: 'Complete a mudança principal.',
        type: 'transform',
        keyFrom: 'transformationFrom',
        keyTo: 'transformationTo',
        fromPlaceholder: 'Meu cliente sai de...',

    {

        maxlength: 300

    {

    {

            { value: 'formal', label: 'Profissional / Formal' },
            { value: 'consultivo', label: 'Consultivo / Estratégico' },
            { value: 'direto', label: 'Direto / Objetivo' },
            { value: 'didatico', label: 'Didático / Simples' },
            { value: 'premium', label: 'Premium / Sofisticado' },
            { value: 'proximo', label: 'Próximo / Humano' }
        ]
    }
];

const OBJECTIVE_LABELS = {
    'vendas': 'Aumentar vendas e faturamento',
    'leads_melhores': 'Atrair leads melhores',
    'reduzir_curiosos': 'Reduzir curiosos no WhatsApp',
    'melhorar_conversao': 'Melhorar conversão em reuniões ou vendas',
    'organizar_atendimento': 'Organizar atendimento comercial',
    'aumentar_ticket': 'Vender ofertas de maior valor'
};

const SEGMENT_LABELS = {
    'saude': 'Saúde',
    'marketing': 'Marketing / Digital',
    'educacao': 'Educação',
    'consultoria': 'Consultoria',
    'tecnologia': 'Tecnologia',
    'servicos': 'Prestação de Serviços',
    'varejo': 'Varejo',
    'imobiliario': 'Imobiliário',
    'financeiro': 'Financeiro',
    'industria': 'Indústria / B2B técnico'
};

const TICKET_LABELS = {
    'ate_500': 'Até R$500',
    '500_2000': 'R$500 a R$2.000',
    '2000_5000': 'R$2.000 a R$5.000',
    '5000_10000': 'R$5.000 a R$10.000',
    '10000_50000': 'R$10.000 a R$50.000',
    'acima_50000': 'Acima de R$50.000'
};

const SALES_MODEL_LABELS = {
    'whatsapp': 'WhatsApp',
    'reuniao': 'Reunião / call',
    'diagnostico': 'Diagnóstico consultivo',
    'ligacao': 'Ligação',
    'proposta': 'Proposta comercial',
    'checkout': 'Checkout direto',
    'presencial': 'Atendimento presencial'
};

const TONE_RULES = {
    'formal': 'Use linguagem profissional, clara e sem informalidade excessiva.',
    'consultivo': 'Use linguagem estratégica, consultiva e orientada a diagnóstico.',
    'direto': 'Use linguagem objetiva, com frases claras e foco em ação.',
    'didatico': 'Explique com simplicidade, exemplos práticos e sem jargões desnecessários.',
    'premium': 'Use linguagem sofisticada, segura e com posicionamento de valor.',
    'proximo': 'Use linguagem humana, próxima e acessível, sem perder profissionalismo.'
};

// Cole aqui a URL do Web App do Google Apps Script para salvar os diagnósticos.
// Ex: https://script.google.com/macros/s/SEU_ID_DO_DEPLOY/exec
const SHEETS_WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbz2-PgVVgIsdulnFhNdp9jyR6HI60uQvtDR99Z4KwlmA2_7XenIXxYLAxBSCfApaBVPBA/exec';

// ---- State ----
let stepIndex = -1;
let diagnosisSaved = false;
const data = {
    name: '',
    email: '',
    businessName: '',

    objective: '',
    segment: '',
    segmentOther: '',
    websiteUrl: '',
    noWebsite: false,
    socialLinks: '',
    noSocialLinks: false,
    offer: '',
    ticket: '',
    salesModel: '',
    idealBuyer: '',
    problem: '',
    transformationFrom: '',
    transformationTo: '',
    differentiator: '',
    objections: '',
    tone: ''
};

// ---- DOM refs ----
const container = document.getElementById('stepsContainer');
const progressBar = document.getElementById('progressBar');

// ---- Render ----
function render() {
    container.innerHTML = '';
    const steps = getSteps();
    steps.forEach((s, i) => {
        const div = document.createElement('div');
        div.className = 'step' + (i === stepIndex ? ' active' : '');
        div.dataset.index = i;
        div.innerHTML = s;
        container.appendChild(div);
    });
    updateProgress();
}

function getSteps() {
    // Step 0 = Welcome, 1..N = questions, N+1 = processing, N+2 = result
    const qCount = QUESTIONS.length;
    const totalQ = qCount;
    let steps = [];

    // Welcome
    steps.push(renderWelcome());

    // Questions
    QUESTIONS.forEach((q, i) => {
        steps.push(renderQuestion(q, i + 1, totalQ));
    });

    // Processing
    steps.push(renderProcessing());

    // Result
    steps.push(renderResult());

    return steps;
}

function renderWelcome() {
    return `
        <div class="welcome-icon">MUV</div>
        <div class="welcome-title">Promt Base do Negócio:</div>
        <div class="welcome-sub">
            Responda a algumas perguntas rápidas e receba um <strong>Promt Base do Negócio</strong> pronto para usar com o agente Don Move. Ele vai ajudar o agente a entender sua oferta, seu público, seu comprador ideal e o tipo de lead que precisa ser filtrado.
        </div>
        <div class="form-group">
            <label>Seu nome</label>
            <input type="text" id="inputName" value="${escHtml(data.name)}" placeholder="Digite seu nome" autocomplete="name">
        </div>
        <div class="form-group">
            <label>Seu e-mail</label>
            <input type="email" id="inputEmail" value="${escHtml(data.email)}" placeholder="seu@email.com" autocomplete="email">
        </div>
        <div class="form-group">
            <label>Nome do seu negócio</label>
            <input type="text" id="inputBusiness" value="${escHtml(data.businessName)}" placeholder="Ex: Agência Alpha, Clínica Viver Bem...">
        </div>
        <div class="btn-group">
            <button class="btn btn-primary" onclick="goToWelcome()">Começar →</button>
        </div>
    `;
}

function renderQuestion(q, num, total) {
    let body = '';
    const label = q.hasOther
        ? `<div class="conditional-field${data[q.key] === 'outro' ? '' : ' hidden'}" id="cond_${q.id}">
              <div class="form-group">
                <input type="text" value="${escHtml(data[q.otherKey] || '')}" placeholder="${q.otherLabel || 'Qual?'}"
                       oninput="onOtherInput('${q.id}','${q.otherKey}',this.value)">
              </div>
            </div>`
        : '';

    if (q.type === 'select') {
        body = `
            <div class="step-count">Pergunta ${num} de ${total}</div>
            <div class="step-title">${q.title}</div>
            <div class="step-subtitle">${q.subtitle || ''}</div>
            <div class="options-grid" id="grid_${q.id}">
                ${q.options.map(o => `
                    <div class="option-card${data[q.key] === o.value ? ' selected' : ''}"
                         onclick="selectOption('${q.key}','${o.value}','${q.id}')">
                        <input type="radio" name="${q.id}" value="${o.value}" ${data[q.key] === o.value ? 'checked' : ''}>
                        ${o.label}
                    </div>
                `).join('')}
            </div>
            ${label}
            <div class="btn-group">
                <button class="btn btn-secondary${num === 1 ? ' hidden' : ''}" onclick="prevStep()">← Voltar</button>
                <button class="btn btn-primary" id="btn_${q.id}" onclick="nextStep()" ${(!data[q.key] || (q.hasOther && data[q.key] === 'outro' && !data[q.otherKey])) ? 'disabled' : ''}>Continuar →</button>
            </div>
        `;
    } else if (q.type === 'checkbox') {
        body = `
            <div class="step-count">Pergunta ${num} de ${total}</div>
            <div class="step-title">${q.title}</div>
            <div class="step-subtitle">${q.subtitle || ''}</div>
            <div class="check-grid" id="grid_${q.id}">
                ${q.options.map(o => {
                    const checked = (data[q.key] || []).includes(o.value);
                    return `
                        <div class="check-card${checked ? ' checked' : ''}" data-value="${escHtml(o.value)}"
                             onclick="toggleCheck('${q.key}','${o.value}','${q.id}')">
                            <div class="check-box">${checked ? '✓' : ''}</div>
                            ${o.label}
                        </div>
                    `;
                }).join('')}
            </div>
            <div class="conditional-field ${(!data[q.key] || data[q.key].length === 0) ? 'hidden' : ''}" id="cond_${q.id}">
                <div class="form-group">
                    <input type="text" placeholder="Outro? Especifique..." value="${escHtml(data[q.key + 'Other'] || '')}" oninput="data['${q.key}Other']=this.value">
                </div>
            </div>
            <div class="btn-group">
                <button class="btn btn-secondary${num === 1 ? ' hidden' : ''}" onclick="prevStep()">← Voltar</button>
                <button class="btn btn-primary" id="btn_${q.id}" onclick="nextStep()" ${(!data[q.key] || data[q.key].length === 0) ? 'disabled' : ''}>Continuar →</button>
            </div>
        `;
    } else if (q.type === 'text') {
        body = `
            <div class="step-count">Pergunta ${num} de ${total}</div>
            <div class="step-title">${q.title}</div>
            <div class="step-subtitle">${q.subtitle || ''}</div>
            <div class="form-group">
                <input type="text" value="${escHtml(data[q.key] || '')}" placeholder="${q.placeholder || ''}"
                       oninput="data['${q.key}']=this.value; updateBtn('${q.id}', this.value)">
            </div>
            <div class="btn-group">
                <button class="btn btn-secondary${num === 1 ? ' hidden' : ''}" onclick="prevStep()">← Voltar</button>
                <button class="btn btn-primary" id="btn_${q.id}" onclick="nextStep()" ${!data[q.key] ? 'disabled' : ''}>Continuar →</button>
            </div>
        `;
    } else if (q.type === 'textarea') {
        const val = data[q.key] || '';
        body = `
            <div class="step-count">Pergunta ${num} de ${total}</div>
            <div class="step-title">${q.title}</div>
            <div class="step-subtitle">${q.subtitle || ''}</div>
            <div class="form-group">
                <textarea placeholder="${q.placeholder || ''}" maxlength="${q.maxlength || ''}"
                    oninput="data['${q.key}']=this.value; updateCharCount('${q.id}',this); updateBtn('${q.id}',this.value)"
                    id="ta_${q.id}">${escHtml(val)}</textarea>
                <div class="char-count" id="cc_${q.id}">${q.maxlength ? (val.length + '/' + q.maxlength) : ''}</div>
            </div>
            <div class="btn-group">
                <button class="btn btn-secondary${num === 1 ? ' hidden' : ''}" onclick="prevStep()">← Voltar</button>
                <button class="btn btn-primary" id="btn_${q.id}" onclick="nextStep()" ${!val ? 'disabled' : ''}>Continuar →</button>
            </div>
        `;
    } else if (q.type === 'optionalText' || q.type === 'optionalTextarea') {
        const val = data[q.key] || '';
        const none = !!data[q.noneKey];
        const field = q.type === 'optionalTextarea'
            ? `<textarea placeholder="${q.placeholder || ''}" maxlength="${q.maxlength || ''}" ${none ? 'disabled' : ''}
                    oninput="data['${q.key}']=this.value; data['${q.noneKey}']=false; updateCharCount('${q.id}',this); updateOptionalBtn('${q.id}','${q.key}','${q.noneKey}')"
                    id="ta_${q.id}">${escHtml(val)}</textarea>
               <div class="char-count" id="cc_${q.id}">${q.maxlength ? (val.length + '/' + q.maxlength) : ''}</div>`
            : `<input type="text" value="${escHtml(val)}" placeholder="${q.placeholder || ''}" ${none ? 'disabled' : ''}
                    oninput="data['${q.key}']=this.value; data['${q.noneKey}']=false; updateOptionalBtn('${q.id}','${q.key}','${q.noneKey}')">`;

        body = `
            <div class="step-count">Pergunta ${num} de ${total}</div>
            <div class="step-title">${q.title}</div>
            <div class="step-subtitle">${q.subtitle || ''}</div>
            <div class="form-group">
                ${field}
            </div>
            <div class="check-grid">
                <div class="check-card${none ? ' checked' : ''}" id="none_${q.id}" onclick="toggleOptionalNone('${q.key}','${q.noneKey}','${q.id}')">
                    <div class="check-box">${none ? '✓' : ''}</div>
                    ${q.noneLabel || 'Não tenho'}
                </div>
            </div>
            <div class="btn-group">
                <button class="btn btn-secondary${num === 1 ? ' hidden' : ''}" onclick="prevStep()">← Voltar</button>
                <button class="btn btn-primary" id="btn_${q.id}" onclick="nextStep()" ${(!val && !none) ? 'disabled' : ''}>Continuar →</button>
            </div>
        `;
    } else if (q.type === 'transform') {
        body = `
            <div class="step-count">Pergunta ${num} de ${total}</div>
            <div class="step-title">${q.title}</div>
            <div class="step-subtitle">${q.subtitle || ''}</div>
            <div class="transform-group">
                <div class="form-group">
                    <input type="text" value="${escHtml(data[q.keyFrom] || '')}" placeholder="${q.fromPlaceholder || ''}"
                           oninput="data['${q.keyFrom}']=this.value; updateTransformBtn()">
                </div>
                <div class="transform-arrow">→</div>
                <div class="form-group">
                    <input type="text" value="${escHtml(data[q.keyTo] || '')}" placeholder="${q.toPlaceholder || ''}"
                           oninput="data['${q.keyTo}']=this.value; updateTransformBtn()">
                </div>
            </div>
            <div class="btn-group">
                <button class="btn btn-secondary${num === 1 ? ' hidden' : ''}" onclick="prevStep()">← Voltar</button>
                <button class="btn btn-primary" id="btn_${q.id}" onclick="nextStep()" ${!data[q.keyFrom] || !data[q.keyTo] ? 'disabled' : ''}>Continuar →</button>
            </div>
        `;
    }
    return body;
}

function renderProcessing() {
    return `
        <div class="processing">
            <div class="spinner"></div>
            <h3>Gerando seu Promt Base do Negócio...</h3>
            <p>Analisando suas respostas e personalizando o resultado</p>
        </div>
    `;
}

function renderResult() {
    const prompt = generatePrompt();
    return `
        <div class="step-count" style="color:var(--success)">✓ promt base concluído</div>
        <div class="step-title" style="margin-bottom:4px">🎯 Seu Promt Base do Negócio</div>
        <div class="step-subtitle" style="margin-bottom:16px">Copie este promt e envie ao agente Don Move junto com seu Raio-X Anti-Curiosos.</div>
        <div class="result-area" id="resultPrompt">${escHtml(prompt)}</div>
        <button class="copy-btn" id="copyBtn" onclick="copyPrompt()">📋 Copiar Promt</button>
        <div class="upsell-box">
            <p>🚀 Próximo passo: Raio-X Anti-Curiosos</p>
            <small>Depois de copiar este promt, envie também o diagnóstico do seu funil para o Don Move cruzar contexto + vazamento.</small>
            <br><br>
            <button class="btn btn-primary" onclick="window.location.href='https://raio-x-git-main-paulonardon-muv-vercel.vercel.app/'">Continuar para o Raio-X →</button>
        </div>
        <div class="btn-group" style="margin-top:12px">
            <button class="btn btn-secondary" onclick="resetAll()">← Refazer diagnóstico</button>
        </div>
    `;
}

// ---- Navigation ----
function goToWelcome() {
    const name = document.getElementById('inputName')?.value.trim();
    const email = document.getElementById('inputEmail')?.value.trim();
    const business = document.getElementById('inputBusiness')?.value.trim();
    if (!name || !email || !business) {
        alert('Preencha todos os campos para começar.');
        return;
    }
    if (!email.includes('@')) {
        alert('Digite um e-mail válido.');
        return;
    }
    data.name = name;
    data.email = email;
    data.businessName = business;
    stepIndex = 1;
    render();
}

function nextStep() {
    const q = QUESTIONS[stepIndex - 1];
    if (q) {
        if (q.type === 'select' && !data[q.key]) return;
        if (q.type === 'select' && q.hasOther && data[q.key] === 'outro' && !data[q.otherKey]) return;
        if (q.type === 'checkbox' && (!data[q.key] || data[q.key].length === 0)) return;
        if (q.type === 'text' && !data[q.key]) return;
        if (q.type === 'textarea' && !data[q.key]) return;
        if ((q.type === 'optionalText' || q.type === 'optionalTextarea') && !data[q.key] && !data[q.noneKey]) return;
        if (q.type === 'transform' && (!data[q.keyFrom] || !data[q.keyTo])) return;
    }
    if (stepIndex < QUESTIONS.length) {
        stepIndex++;
        render();
    } else {
        // All questions done -> processing
        stepIndex = QUESTIONS.length + 1; // processing step
        render();
        setTimeout(() => {
            stepIndex = QUESTIONS.length + 2; // result step
            render();
            saveDiagnosis();
        }, 1200);
    }
}

function prevStep() {
    if (stepIndex > 1) {
        stepIndex--;
        render();
    }
}

function updateProgress() {
    const total = QUESTIONS.length;
    let pct = 0;
    if (stepIndex === 0) pct = 0;
    else if (stepIndex <= total) pct = (stepIndex / total) * 100;
    else pct = 100;
    progressBar.style.width = pct + '%';
}

// ---- Actions ----
function selectOption(key, value, qid) {
    data[key] = value;
    const grid = document.getElementById('grid_' + qid);
    if (grid) {
        grid.querySelectorAll('.option-card').forEach(el => {
            const input = el.querySelector('input');
            el.classList.toggle('selected', input.value === value);
            if (input.value === value) input.checked = true;
        });
    }
    const cond = document.getElementById('cond_' + qid);
    if (cond) {
        cond.style.display = (value === 'outro') ? 'block' : 'none';
        if (value !== 'outro') { data[key + 'Other'] = ''; }
    }
    const btn = document.getElementById('btn_' + qid);
    if (btn) {
        if (value === 'outro') {
            btn.disabled = !data[key + 'Other'];
        } else {
            btn.disabled = false;
        }
    }
}

function toggleCheck(key, value, qid) {
    if (!data[key]) data[key] = [];
    const idx = data[key].indexOf(value);
    if (idx === -1) data[key].push(value);
    else data[key].splice(idx, 1);
    const grid = document.getElementById('grid_' + qid);
    if (grid) {
        grid.querySelectorAll('.check-card').forEach(el => {
            const val = el.dataset.value || '';
            const checked = (data[key] || []).includes(val);
            el.classList.toggle('checked', checked);
            const box = el.querySelector('.check-box');
            if (box) box.textContent = checked ? '✓' : '';
        });
    }
    // Show conditional if any checked
    const cond = document.getElementById('cond_' + qid);
    if (cond) {
        cond.classList.toggle('hidden', !data[key] || data[key].length === 0);
    }
    const btn = document.getElementById('btn_' + qid);
    if (btn) btn.disabled = !data[key] || data[key].length === 0;
}

function updateBtn(qid, val) {
    const btn = document.getElementById('btn_' + qid);
    if (btn) btn.disabled = !val;
}

function updateOptionalBtn(qid, key, noneKey) {
    const btn = document.getElementById('btn_' + qid);
    const noneCard = document.getElementById('none_' + qid);
    if (btn) btn.disabled = !data[key] && !data[noneKey];
    if (noneCard) {
        noneCard.classList.toggle('checked', !!data[noneKey]);
        const box = noneCard.querySelector('.check-box');
        if (box) box.textContent = data[noneKey] ? '✓' : '';
    }
}

function toggleOptionalNone(key, noneKey, qid) {
    data[noneKey] = !data[noneKey];
    if (data[noneKey]) data[key] = '';
    render();
}

function updateTransformBtn() {
    const btn = document.getElementById('btn_transformation');
    if (btn) btn.disabled = !data.transformationFrom || !data.transformationTo;
}

function updateCharCount(qid, el) {
    const cc = document.getElementById('cc_' + qid);
    if (cc) {
        const len = el.value.length;
        const max = el.maxLength;
        cc.textContent = len + '/' + max;
        cc.className = 'char-count' + (len > max * 0.9 ? ' warning' : '') + (len >= max ? ' over' : '');
    }
}

function onOtherInput(qid, otherKey, value) {
    data[otherKey] = value;
    const btn = document.getElementById('btn_' + qid);
    if (btn) btn.disabled = !value.trim();
}

// ---- Prompt Generation ----
function generatePrompt() {
    const seg = SEGMENT_LABELS[data.segment] || data.segmentOther || data.segment;
    const objLbl = OBJECTIVE_LABELS[data.objective] || data.objective;
    const ticket = TICKET_LABELS[data.ticket] || data.ticket;
    const salesModel = SALES_MODEL_LABELS[data.salesModel] || data.salesModel;

    const toneLbl = data.tone

    return `🧠 PROMT BASE DO NEGÓCIO — ${data.businessName.toUpperCase()}

Este documento é o contexto base do negócio do aluno.

---

${data.businessName}

${seg}

${objLbl}

${website}

Quando houver links informados, use-os para acessar mais contexto sobre posicionamento, comunicação, oferta, provas, linguagem e presença digital do negócio do aluno.

---

OFERTA PRINCIPAL

O que o negócio vende:
${data.offer}

Ticket médio:
${ticket}

Como a venda acontece hoje:
${salesModel}

---

COMPRADOR IDEAL

Quem é o melhor cliente para este negócio:
${data.idealBuyer}

Esse é o perfil que deve ser priorizado nas próximas recomendações, anúncios, triagens e mensagens comerciais.

---

PROBLEMA CENTRAL

Principal problema que a oferta resolve:
${data.problem}

---

TRANSFORMAÇÃO

Antes da solução, o cliente está assim:
${data.transformationFrom}

Depois da solução, o cliente deve chegar aqui:
${data.transformationTo}

Transformação resumida:
Ajudar o comprador ideal a sair de "${data.transformationFrom}" e chegar em "${data.transformationTo}" por meio da oferta principal do negócio.

${data.differentiator}

Esse diferencial deve ser usado para reforçar valor, confiança e posicionamento nas mensagens comerciais.

}

// ---- Google Sheets Integration ----
function buildDiagnosisPayload() {
    const segmentLabel = data.segment === 'outro'
        ? data.segmentOther
        : (SEGMENT_LABELS[data.segment] || getOptionLabel('segment', data.segment));
    const objectiveLabel = OBJECTIVE_LABELS[data.objective] || data.objective;
    const ticketLabel = TICKET_LABELS[data.ticket] || data.ticket;
    const salesModelLabel = SALES_MODEL_LABELS[data.salesModel] || data.salesModel;
    const toneLabel = getOptionLabel('tone', data.tone);
    const websiteUrl = data.noWebsite ? 'Não tem site' : data.websiteUrl;
    const socialLinks = data.noSocialLinks ? 'Não tem redes sociais' : data.socialLinks;

    return {
        submittedAt: new Date().toISOString(),
        name: data.name,
        email: data.email,
        businessName: data.businessName,
        objectiveLabel,
        objectiveValue: data.objective,
        segmentLabel,
        segmentValue: data.segment,
        segmentOther: data.segmentOther,
        websiteUrl,
        noWebsite: data.noWebsite ? 'Sim' : 'Não',
        socialLinks,
        noSocialLinks: data.noSocialLinks ? 'Sim' : 'Não',
        offer: data.offer,
        ticketLabel,
        ticketValue: data.ticket,
        salesModelLabel,
        salesModelValue: data.salesModel,
        idealBuyer: data.idealBuyer,
        problem: data.problem,
        transformationFrom: data.transformationFrom,
        transformationTo: data.transformationTo,
        differentiator: data.differentiator,
        objections: data.objections,
        toneLabel,
        toneValue: data.tone,
        objective: objectiveLabel,
        segment: segmentLabel,
        ticket: ticketLabel,
        salesModel: salesModelLabel,
        tone: toneLabel,
        audience: data.idealBuyer,
        product: data.offer,
        purpose: `${objectiveLabel} | ${salesModelLabel} | ${ticketLabel}`,
        prompt: generatePrompt()
    };
}

function getOptionLabel(key, value) {
    if (!value) return '';
    const question = QUESTIONS.find(q => q.key === key);
    return question?.options?.find(o => o.value === value)?.label || value;
}

function saveDiagnosis() {
    if (diagnosisSaved || !SHEETS_WEBHOOK_URL) return;

    diagnosisSaved = true;
    fetch(SHEETS_WEBHOOK_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(buildDiagnosisPayload())
    }).catch(error => {
        diagnosisSaved = false;
        console.error('Erro ao salvar diagnóstico:', error);
    });
}

// ---- Utility ----
function escHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function copyPrompt() {
    const el = document.getElementById('resultPrompt');
    const btn = document.getElementById('copyBtn');
    if (!el || !btn) return;
    navigator.clipboard.writeText(el.textContent).then(() => {
        btn.textContent = '✓ Copiado!';
        btn.classList.add('copied');
        setTimeout(() => {
            btn.textContent = '📋 Copiar Promt';
            btn.classList.remove('copied');
        }, 2000);
    }).catch(() => {
        // Fallback
        const ta = document.createElement('textarea');
        ta.value = el.textContent;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        ta.remove();
        btn.textContent = '✓ Copiado!';
        btn.classList.add('copied');
        setTimeout(() => {
            btn.textContent = '📋 Copiar Promt';
            btn.classList.remove('copied');
        }, 2000);
    });
}

function resetAll() {
    Object.keys(data).forEach(k => {
        if (Array.isArray(data[k])) data[k] = [];
        else data[k] = '';
    });
    diagnosisSaved = false;
    stepIndex = 0;
    render();
}

// ---- Init ----
stepIndex = 0;
render();
